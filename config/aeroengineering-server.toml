[engineFan]
	#Thrust generated by the Engine Fan when active.
	# Default: 1.0
	# Range: 0.0 ~ 1.7976931348623157E308
	thrust = 1.0
	#Airflow generated by the Engine Fan when active.
	# Default: 10.0
	# Range: 0.0 ~ 1.7976931348623157E308
	airflow = 10.0
	#Airflow multiplier applied to a normal turbofan engine.
	# Default: 0.9
	# Range: 0.0 ~ 1.7976931348623157E308
	turbofanAirflowMultiplier = 0.9
	#Propeller radius used by Aeronautics/Sable physics.
	# Default: 1.5
	# Range: 0.0 ~ 1.7976931348623157E308
	radius = 1.5
	#Propeller offset from the block center, in blocks.
	# Default: 0.1875
	# Range: -1.7976931348623157E308 ~ 1.7976931348623157E308
	offset = 0.1875
	#Stress impact consumed by the Engine Fan.
	# Default: 16.0
	# Range: 0.0 ~ 1.7976931348623157E308
	stressImpact = 16.0
	#Thrust multiplier when the linear engine structure is complete.
	# Default: 620.0
	# Range: 0.0 ~ 1.7976931348623157E308
	completeEngineThrustMultiplier = 620.0
	#Output multiplier applied when the core engine is complete but its casing is incomplete.
	# Default: 0.5
	# Range: 0.0 ~ 1.7976931348623157E308
	incompleteCasingMultiplier = 0.5
	#Additional output multiplier applied when the exhaust nozzle fully wraps the exhaust cone.
	# Default: 2.0
	# Range: 0.0 ~ 1.7976931348623157E308
	completeNozzleMultiplier = 2.0
	#Output multiplier for a complete afterburning turbofan while its afterburner signal is off. Keep below 1.0 so a normal complete turbofan has more dry thrust.
	# Default: 0.8
	# Range: 0.0 ~ 1.7976931348623157E308
	inactiveAfterburnerMultiplier = 0.8
	#Output multiplier for a complete afterburning turbofan while its afterburner signal is on.
	# Default: 5.0
	# Range: 0.0 ~ 1.7976931348623157E308
	activeAfterburnerMultiplier = 5.0

[engineGearbox]
	#Stress capacity provided by the Engine Gearbox when active.
	# Default: 128.0
	# Range: 0.0 ~ 160.0
	stressCapacity = 128.0

[airborneRadar]
	#Scan range multiplier. Effective radar range is abs(rotation speed) * this value, in blocks.
	# Default: 4.0
	# Range: 0.0 ~ 1.7976931348623157E308
	rangeMultiplier = 4.0
	#Stress impact consumed by the Airborne Radar.
	# Default: 8.0
	# Range: 0.0 ~ 1.7976931348623157E308
	stressImpact = 8.0

[missile]
	#Maximum missile speed in blocks per tick.
	# Default: 18.0
	# Range: 0.0 ~ 1.7976931348623157E308
	maxSpeed = 18.0
	#Missile acceleration while fuel remains, in blocks per tick per tick.
	# Default: 1.0
	# Range: 0.0 ~ 1.7976931348623157E308
	acceleration = 1.0
	#Maximum missile guidance turn angle per tick, in degrees.
	# Default: 8.0
	# Range: 0.0 ~ 180.0
	turnDegreesPerTick = 8.0
	#Maximum missile lifetime in ticks before it is removed or detonated.
	# Default: 600
	# Range: > 1
	maxLifeTicks = 600
	#Powered missile flight time in ticks. Acceleration is applied while fuel remains.
	# Default: 300
	# Range: > 0
	fuelTicks = 300
	#Explosion power added per assembled block for physical missiles, before maxPhysicalExplosionPower clamps it.
	# Default: 4.0
	# Range: 0.0 ~ 1.7976931348623157E308
	physicalExplosionPowerPerBlock = 4.0
	#Maximum explosion power for physical missiles. Keeps large assembled missiles from causing severe TPS spikes.
	# Default: 8.0
	# Range: 0.0 ~ 1.7976931348623157E308
	maxPhysicalExplosionPower = 8.0
	#Radius in blocks for direct physical missile block damage against Sable structures.
	# Default: 6.0
	# Range: 0.0 ~ 1.7976931348623157E308
	physicalBlockDamageRadius = 6.0
	#Maximum number of Sable structure blocks a physical missile can directly destroy per detonation.
	# Default: 125
	# Range: > 0
	physicalMaxBlocksDestroyed = 125
	#Controls missile explosion effects.
	#NO_DAMAGE_NO_TERRAIN: explosion is visual only; no entity damage and no terrain destruction.
	#DAMAGE_NO_TERRAIN: damages entities but does not destroy terrain.
	#DAMAGE_AND_TERRAIN: damages entities and can destroy terrain.
	#Allowed Values: NO_DAMAGE_NO_TERRAIN, DAMAGE_NO_TERRAIN, DAMAGE_AND_TERRAIN
	explosionMode = "DAMAGE_AND_TERRAIN"

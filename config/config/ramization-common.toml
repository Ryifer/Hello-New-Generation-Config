[smartGC]
	#Enable the SmartGC Scheduler.
	#When true, garbage collection is only triggered during idle server ticks
	#to avoid lag spikes caused by GC pauses mid-tick.
	enabled = true
	#How full the JVM heap must be (%) before SmartGC will request a collection.
	#Range: 40-95. Default: 70.
	# Default: 70
	# Range: 40 ~ 95
	heapThresholdPercent = 90
	#Maximum milliseconds a recent tick may have taken to be considered 'idle'.
	#Range: 10-48. Default: 30.
	# Default: 30
	# Range: 10 ~ 48
	idleTickMs = 40
	#How many consecutive idle ticks must occur before GC is triggered.
	#Range: 2-20. Default: 5.
	# Default: 5
	# Range: 2 ~ 20
	idleTicksRequired = 10
	#Minimum seconds between two SmartGC-triggered collections.
	#Range: 30-600. Default: 120.
	# Default: 120
	# Range: 30 ~ 600
	cooldownSeconds = 180

[interning]
	#Deduplicate ResourceLocation namespace/path strings via a shared intern pool.
	resourceLocations = true
	#Deduplicate CompoundTag key strings via the intern pool.
	nbtKeys = true
	#Maximum number of unique strings held in the intern pool.
	#0 = unlimited. Range: 0-500000. Default: 100000.
	# Default: 100000
	# Range: 0 ~ 500000
	poolMaxSize = 100000

[textureCache]
	#Periodically trim unused textures from the atlas cache on the client. CLIENT-SIDE ONLY.
	enableTrim = true
	#How often (in seconds) to check and trim the texture cache. Range: 30-3600. Default: 300.
	# Default: 300
	# Range: 30 ~ 3600
	trimIntervalSeconds = 300

[logging]
	#Log memory savings statistics to the console every 5 minutes.
	periodicStats = true
	#Log a message each time SmartGC triggers a garbage collection.
	gcEvents = false
